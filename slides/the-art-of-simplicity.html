<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简约的艺术</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        /* === CSS Custom Properties === */
        :root {
            --bg-primary:    #FAF9F6;
            --bg-secondary:  #F0EEE8;
            --bg-card:       rgba(255, 255, 255, 0.55);
            --text-primary:  #1A1916;
            --text-secondary:#6B6560;
            --text-muted:    #A09890;
            --accent:        #1A1916;
            --accent-2:      #6B6560;
            --border:        rgba(226, 222, 213, 0.6);
            --border-strong: #C9C4B8;
        }

        /* === Reset === */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html {
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            height: 100%;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'DM Sans', ui-sans-serif, sans-serif;
            -webkit-font-smoothing: antialiased;
            height: 100%;
        }

        /* === Background Layers === */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: linear-gradient(180deg, #FAF9F6 0%, #F5F3EE 50%, #FAF9F6 100%);
            z-index: -3;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 3px,
                rgba(0, 0, 0, 0.008) 3px,
                rgba(0, 0, 0, 0.008) 6px
            );
            z-index: -1;
            pointer-events: none;
        }

        /* === Geometric Background Shapes === */
        .geo-shape-1, .geo-shape-2, .geo-shape-3 {
            position: fixed;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.20;
            z-index: -2;
            pointer-events: none;
        }
        .geo-shape-1 { width: 600px; height: 600px; background: #FFB347; top: -200px; right: -100px; }
        .geo-shape-2 { width: 400px; height: 400px; background: #FFA633; bottom: -100px; left: -100px; }
        .geo-shape-3 { width: 300px; height: 300px; background: #EE9526; top: 50%; left: 30%; opacity: 0.15; }

        /* === Navigation === */
        .progress-bar {
            position: fixed;
            top: 0; left: 0;
            height: 2px;
            background: var(--border-strong);
            width: 0%;
            z-index: 100;
            transition: width 0.2s ease;
        }

        .nav-dots {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 100;
        }
        .nav-dots button {
            width: 6px; height: 6px;
            border-radius: 50%;
            border: 1px solid var(--border-strong);
            background: transparent;
            cursor: pointer;
            padding: 0;
            transition: background 0.2s;
        }
        .nav-dots button.active {
            background: var(--text-primary);
            border-color: var(--text-primary);
        }

        /* === Slide Structure === */
        .slide {
            height: 100dvh;
            scroll-snap-align: start;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slide-canvas {
            width: 1920px;
            height: 1080px;
            flex-shrink: 0;
            transform-origin: center center;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px 80px;
        }

        /* === Typography === */
        h1 { font-family: 'DM Serif Display', serif; font-size: 64px; font-weight: 400; line-height: 1.15; letter-spacing: -0.02em; }
        h2 { font-family: 'DM Serif Display', serif; font-size: 42px; font-weight: 400; line-height: 1.2; letter-spacing: -0.01em; }
        .label { font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); font-weight: 400; }
        .subtitle { font-size: 22px; color: var(--text-secondary); font-weight: 300; line-height: 1.6; }
        .body-text { font-size: 18px; color: var(--text-secondary); line-height: 1.75; }

        /* === Reveal Animation === */
        .reveal {
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .reveal.visible { opacity: 1; }
        .reveal:nth-child(1) { transition-delay: 0s; }
        .reveal:nth-child(2) { transition-delay: 0.06s; }
        .reveal:nth-child(3) { transition-delay: 0.12s; }
        .reveal:nth-child(4) { transition-delay: 0.18s; }
        .reveal:nth-child(5) { transition-delay: 0.24s; }
        .reveal:nth-child(6) { transition-delay: 0.30s; }

        /* === Dividers === */
        .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
        .divider-wide { border: none; border-top: 1px solid var(--border); width: 300px; }
        .heading-rule { border: none; border-bottom: 1px solid var(--border); padding-bottom: 16px; margin-bottom: 24px; }

        /* === Cards === */
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 28px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.10);
        }
        .card-icon { width: 28px; height: 28px; color: var(--accent-2); margin-bottom: 12px; transition: transform 0.2s ease; }
        .card:hover .card-icon { transform: scale(1.05); }
        .card-label { font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }
        .card-title { font-family: 'DM Serif Display', serif; font-size: 24px; margin-bottom: 12px; }
        .card-body { font-size: 17px; color: var(--text-secondary); line-height: 1.7; flex: 1; }

        /* === Card Grid === */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            max-width: 1600px;
            margin: 0 auto;
            flex: 1;
            align-content: stretch;
        }

        /* === Decorative Fills === */
        .deco-circle { position: absolute; border-radius: 50%; pointer-events: none; z-index: 0; }
        .deco-rule   { position: absolute; pointer-events: none; z-index: 0; }
        .slide-canvas > *:not(.deco-circle):not(.deco-rule):not(.quote-deco) { position: relative; z-index: 1; }

        /* === Slide 1 — Cover === */
        .cover-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 0;
        }
        .cover-date {
            font-size: 13px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 40px;
        }
        .cover-rule {
            border: none;
            border-top: 1px solid var(--border-strong);
            margin: 32px 0;
            width: 100%;
        }
        .cover-subtitle {
            font-size: 22px;
            color: var(--text-secondary);
            font-weight: 300;
            line-height: 1.6;
            max-width: 700px;
        }
        .cover-author {
            font-size: 15px;
            color: var(--text-muted);
            letter-spacing: 0.04em;
            margin-top: 40px;
        }

        /* === Reduced Motion === */
        @media (prefers-reduced-motion: reduce) {
            .reveal { transition: opacity 0.3s ease; opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- Geometric background shapes -->
    <div class="geo-shape-1"></div>
    <div class="geo-shape-2"></div>
    <div class="geo-shape-3"></div>

    <!-- Navigation -->
    <div class="progress-bar" id="progressBar"></div>
    <nav class="nav-dots" id="navDots" aria-label="Slide navigation"></nav>

    <!-- ===== Slide 1: Cover ===== -->
    <section class="slide title-slide" data-index="0">
        <div class="slide-canvas">
            <!-- Decorative fills for sparse cover slide -->
            <div class="deco-circle" style="width:320px;height:320px;background:rgba(255,179,71,0.05);filter:blur(40px);top:-60px;left:-80px;"></div>
            <div class="deco-circle" style="width:180px;height:180px;background:rgba(238,149,38,0.04);filter:blur(30px);bottom:120px;right:200px;"></div>
            <div class="deco-rule" style="width:160px;height:1px;background:linear-gradient(90deg, transparent, var(--border-strong), transparent);opacity:0.4;bottom:140px;left:80px;"></div>

            <div class="cover-content">
                <p class="cover-date reveal">2026 · OpenCode Revela</p>
                <h1 class="reveal">简约的<em>艺术</em></h1>
                <hr class="cover-rule reveal">
                <p class="cover-subtitle reveal">以少胜多：当我们去除一切多余之物，<br>真正重要的东西便会显现。</p>
                <p class="cover-author reveal">Revela · 演示示例</p>
            </div>

            <div class="deco-rule" style="width:220px;height:1px;background:linear-gradient(90deg, transparent, var(--border-strong), transparent);opacity:0.35;bottom:80px;right:80px;"></div>
        </div>
    </section>

    <!-- ===== Slide 2: Core Content ===== -->
    <section class="slide" data-index="1">
        <div class="slide-canvas" style="justify-content: flex-start; padding-top: 80px;">

            <div style="max-width:1600px;margin:0 auto;width:100%;">
                <h2 class="heading-rule reveal">三个核心原则</h2>
                <p class="subtitle reveal" style="margin-bottom:40px;">简约不是缺乏，而是一种精炼的状态。</p>
            </div>

            <div class="card-grid" style="max-width:1600px;margin:0 auto;width:100%;">
                <div class="card reveal">
                    <i data-lucide="eye" class="card-icon"></i>
                    <p class="card-label">01</p>
                    <p class="card-title">清晰可见</p>
                    <p class="card-body">每一个元素都应该有其存在的理由。去除装饰，让内容本身成为视觉焦点。清晰的设计传递清晰的思想。</p>
                </div>
                <div class="card reveal">
                    <i data-lucide="minimize-2" class="card-icon"></i>
                    <p class="card-label">02</p>
                    <p class="card-title">减法思维</p>
                    <p class="card-body">伟大的设计不是无法再添加，而是无法再删减。每一次删减都是一次提炼，让核心信息更加突出。</p>
                </div>
                <div class="card reveal">
                    <i data-lucide="circle" class="card-icon"></i>
                    <p class="card-label">03</p>
                    <p class="card-title">留白之道</p>
                    <p class="card-body">空白不是空洞，而是呼吸的空间。适当的留白给予观众思考的余地，也赋予内容优雅的节奏感。</p>
                </div>
            </div>

        </div>
    </section>

    <script>
        /* === SlidePresentation Class === */
        class SlidePresentation {
            constructor() {
                this.slides = document.querySelectorAll('.slide');
                this.currentSlide = 0;
                this.setupScaling();
                this.setupProgressBar();
                this.setupNavDots();
                this.setupIntersectionObserver();
                this.setupKeyboardNav();
                this.setupTouchNav();
                this.setupMouseWheel();
            }

            setupScaling() {
                const canvases = document.querySelectorAll('.slide-canvas');
                const BASE_W = 1920, BASE_H = 1080;
                const update = () => {
                    const vw = window.innerWidth;
                    const vh = window.innerHeight;
                    const scale = Math.min(vw / BASE_W, vh / BASE_H);
                    canvases.forEach(c => { c.style.transform = `scale(${scale})`; });
                };
                window.addEventListener('resize', update);
                update();
            }

            setupProgressBar() {
                const bar = document.getElementById('progressBar');
                const update = () => {
                    const scrolled = window.scrollY;
                    const total = document.body.scrollHeight - window.innerHeight;
                    bar.style.width = total > 0 ? (scrolled / total * 100) + '%' : '0%';
                };
                window.addEventListener('scroll', update, { passive: true });
                update();
            }

            setupNavDots() {
                const nav = document.getElementById('navDots');
                this.slides.forEach((_, i) => {
                    const btn = document.createElement('button');
                    btn.setAttribute('aria-label', `Go to slide ${i + 1}`);
                    if (i === 0) btn.classList.add('active');
                    btn.addEventListener('click', () => this.goTo(i));
                    nav.appendChild(btn);
                });
                this.dots = nav.querySelectorAll('button');

                const obs = new IntersectionObserver((entries) => {
                    entries.forEach(e => {
                        if (e.isIntersecting) {
                            const idx = parseInt(e.target.dataset.index);
                            this.dots.forEach((d, i) => d.classList.toggle('active', i === idx));
                            this.currentSlide = idx;
                        }
                    });
                }, { threshold: 0.5 });
                this.slides.forEach(s => obs.observe(s));
            }

            setupIntersectionObserver() {
                const obs = new IntersectionObserver((entries) => {
                    entries.forEach(e => {
                        if (e.isIntersecting) {
                            e.target.querySelectorAll('.reveal').forEach(el => el.classList.add('visible'));
                        }
                    });
                }, { threshold: 0.15 });
                this.slides.forEach(s => obs.observe(s));
            }

            setupKeyboardNav() {
                document.addEventListener('keydown', e => {
                    if (['ArrowDown', 'ArrowRight', ' ', 'PageDown'].includes(e.key)) {
                        e.preventDefault();
                        this.goTo(this.currentSlide + 1);
                    } else if (['ArrowUp', 'ArrowLeft', 'PageUp'].includes(e.key)) {
                        e.preventDefault();
                        this.goTo(this.currentSlide - 1);
                    }
                });
            }

            setupTouchNav() {
                let startY = 0;
                document.addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, { passive: true });
                document.addEventListener('touchend', e => {
                    const dy = startY - e.changedTouches[0].clientY;
                    if (Math.abs(dy) > 40) this.goTo(this.currentSlide + (dy > 0 ? 1 : -1));
                }, { passive: true });
            }

            setupMouseWheel() {
                let last = 0;
                document.addEventListener('wheel', e => {
                    const now = Date.now();
                    if (now - last < 800) return;
                    last = now;
                    this.goTo(this.currentSlide + (e.deltaY > 0 ? 1 : -1));
                }, { passive: true });
            }

            goTo(idx) {
                const clamped = Math.max(0, Math.min(this.slides.length - 1, idx));
                this.slides[clamped].scrollIntoView({ behavior: 'smooth' });
                this.currentSlide = clamped;
            }
        }

        new SlidePresentation();
        lucide.createIcons();

        /* === Inline Editing === */
        (function() {
            const EDITABLE = 'h1,h2,h3,h4,p,span,li,blockquote,cite,' +
                '.card-title,.card-body,.stat-number,.stat-label,.stat-desc,' +
                '.step-title,.step-desc';
            let hoverTimer = null;
            let activeEl = null;

            document.querySelectorAll(EDITABLE).forEach(el => {
                el.addEventListener('mouseenter', () => {
                    hoverTimer = setTimeout(() => {
                        el.style.outline = '1px dashed rgba(128,128,128,0.3)';
                        el.style.cursor = 'text';
                    }, 400);
                });
                el.addEventListener('mouseleave', () => {
                    clearTimeout(hoverTimer);
                    if (el !== activeEl) {
                        el.style.outline = '';
                        el.style.cursor = '';
                    }
                });
                el.addEventListener('click', (e) => {
                    if (activeEl && activeEl !== el) {
                        activeEl.contentEditable = 'false';
                        activeEl.style.outline = '';
                        activeEl.style.cursor = '';
                    }
                    el.contentEditable = 'true';
                    el.style.outline = '2px solid rgba(59,130,246,0.5)';
                    el.style.cursor = 'text';
                    activeEl = el;
                    e.stopPropagation();
                });
            });

            document.addEventListener('click', () => {
                if (activeEl) {
                    activeEl.contentEditable = 'false';
                    activeEl.style.outline = '';
                    activeEl.style.cursor = '';
                    activeEl = null;
                }
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && activeEl) {
                    activeEl.contentEditable = 'false';
                    activeEl.style.outline = '';
                    activeEl.style.cursor = '';
                    activeEl = null;
                }
            });

            window.getEditedHTML = () =>
                '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
        })();
    </script>
</body>
</html>
